{% extends 'gallery/base.html' %}
{% block title %}Upload Image{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title mb-4 text-center">
                    <i class="bi bi-cloud-upload text-primary"></i> Upload an Image
                </h3>
                <form method="post" enctype="multipart/form-data" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.title.id_for_label }}" class="form-label">Title</label>
                        {{ form.title }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.image.id_for_label }}" class="form-label">Choose Image *</label>
                        {{ form.image }}
                        <div class="form-text">Accepted formats: JPG, JPEG, PNG, GIF. Maximum size: 10 MB.</div>
                    </div>
                    <div id="imagePreviewContainer" class="mb-3 text-center d-none">
                        <img id="imagePreview" src="#" alt="Preview" class="img-fluid rounded border" style="max-height: 250px;">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-upload me-1"></i>Upload
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
